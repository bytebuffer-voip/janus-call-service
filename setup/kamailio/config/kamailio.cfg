####### Global Parameters #######
debug=2
log_stderror=yes
log_facility=LOG_LOCAL0

fork=yes
children=1

auto_aliases=no
rev_dns=no

####### TCP tuning #######
tcp_max_connections=20480
tcp_connect_timeout=5
tcp_send_timeout=5
tcp_accept_no_cl=yes

####### IP / Port listen #######
listen=tcp:127.0.0.1:5061
listen=udp:127.0.0.1:5061
listen=tcp:103.216.119.180:5061
listen=udp:103.216.119.180:5061
##########################################################
# Module path
mpath="/usr/local/lib64/kamailio/modules/"

####### Load modules #######
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "ctl.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "http_client.so"
loadmodule "dialog.so"
loadmodule "textopsx.so"
loadmodule "rtpengine.so"
loadmodule "xhttp.so"
loadmodule "json.so"
loadmodule "jsonrpcs.so"
loadmodule "jansson.so"

##########################################################
# Module parameters

# ----- tm params -----
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)
modparam("tm", "local_ack_mode", 1)

# Record-Route config
modparam("rr", "append_fromtag", 0)
modparam("rr", "enable_full_lr", 1)

# rtpengine params
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:2223")

# http_client
modparam("http_client", "httpcon", "backend=>http://127.0.0.1:10004")

modparam("maxfwd", "max_limit", 10)

# xhttp - URL matching để xhttp chỉ xử lý các URL bắt đầu bằng /sip
modparam("xhttp", "url_match", "^/")

# dialog
modparam("dialog", "dlg_flag", 4)
modparam("dialog", "track_cseq_updates", 1)
modparam("dialog", "db_mode", 0)  # No database, memory only
modparam("dialog", "default_timeout", 43200)  # 12 hours default timeout

# jsonrpcs - cho phép gọi RPC qua HTTP
modparam("jsonrpcs", "transport", 1)  # 1 = HTTP only
modparam("jsonrpcs", "pretty_format", 1)

####### Routing engine #######
cfgengine "native"

event_route[xhttp:request] {
    xhttp_reply("403", "Forbidden", "text/html", "<html><body><h1>403 Forbidden</h1><p>URL: $hu</p></body></html>");
    exit;
}

request_route {
 exit;
}