####### Global Parameters #######
debug=2
log_stderror=yes
log_facility=LOG_LOCAL0

fork=yes
children=1

auto_aliases=no
rev_dns=no

####### TCP tuning #######
tcp_max_connections=20480
tcp_connect_timeout=5
tcp_send_timeout=5
tcp_accept_no_cl=yes

####### IP / Port listen #######
listen=tcp:127.0.0.1:5061
listen=udp:127.0.0.1:5061
listen=tcp:103.216.119.180:5061
listen=udp:103.216.119.180:5061
##########################################################
# Module path
mpath="/usr/local/lib64/kamailio/modules/"

####### Load modules #######
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "ctl.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "http_client.so"
loadmodule "dialog.so"
loadmodule "textopsx.so"
loadmodule "rtpengine.so"
loadmodule "xhttp.so"
loadmodule "json.so"
loadmodule "jsonrpcs.so"
loadmodule "jansson.so"

##########################################################
# Module parameters

# ----- tm params -----
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)
modparam("tm", "local_ack_mode", 1)

# Record-Route config
modparam("rr", "append_fromtag", 0)
modparam("rr", "enable_full_lr", 1)

# rtpengine params
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:2223")

# http_client
modparam("http_client", "httpcon", "backend=>http://127.0.0.1:10004")

modparam("maxfwd", "max_limit", 10)

# xhttp - URL matching để xhttp chỉ xử lý các URL bắt đầu bằng /sip
modparam("xhttp", "url_match", "^/")

# dialog
modparam("dialog", "dlg_flag", 4)
modparam("dialog", "track_cseq_updates", 1)
modparam("dialog", "db_mode", 0)  # No database, memory only
modparam("dialog", "default_timeout", 43200)  # 12 hours default timeout

# jsonrpcs - cho phép gọi RPC qua HTTP
modparam("jsonrpcs", "transport", 1)  # 1 = HTTP only
modparam("jsonrpcs", "pretty_format", 1)

####### Routing engine #######
cfgengine "native"

event_route[xhttp:request] {
    xhttp_reply("403", "Forbidden", "text/html", "<html><body><h1>403 Forbidden</h1><p>URL: $hu</p></body></html>");
    exit;
}

route[RELAY] {
        # enable additional event routes for forwarded requests
        if (is_method("INVITE|BYE|SUBSCRIBE|UPDATE")) {
            if(!t_is_set("branch_route")) t_on_branch("MANAGE_BRANCH");
        }
        if (is_method("INVITE|SUBSCRIBE|UPDATE")) {
            if(!t_is_set("onreply_route")) t_on_reply("MANAGE_REPLY");
        }
        if (is_method("INVITE")) {
            if(!t_is_set("failure_route")) t_on_failure("INVITE_FAILED");
        }
        if (is_method("CANCEL")) {
            rtpengine_delete();
            xlog("L_INFO", "CANCEL received, deleting RTPEngine session for call_id=$ci\n");
        }
        if (!t_relay()) {
            sl_reply_error();
        }
        exit;
}

route[WITHINDLG] {
    if (!has_totag()) return;

    xlog("L_INFO", "WITHINDLG: method=$rm, call_id=$ci, has_totag=yes\n");
    xlog("L_INFO", "WITHINDLG: Route header=$hdr(Route)\n");

    # sequential request within a dialog should
    # take the path determined by record-routing
    if (loose_route()) {
        xlog("L_INFO", "WITHINDLG: loose_route() matched for $rm\n");
        if (is_method("BYE")) {
            xlog("L_INFO", "BYE within dialog: $ci\n");
            # Set reply route để xử lý khi nhận response cho BYE
            t_on_reply("MANAGE_BYE_REPLY");
        } else if (is_method("ACK")) {
            # ACK is forwarded statelessly
            xlog("L_INFO", "ACK within dialog (loose_route): $ci\n");
        }
        route(RELAY);
        exit;
    }

    xlog("L_INFO", "WITHINDLG: loose_route() did NOT match\n");

    if (is_method("ACK")) {
        xlog("L_INFO", "WITHINDLG: Processing ACK without loose_route\n");
        if (t_check_trans()) {
            # no loose-route, but stateful ACK;
            # must be an ACK after a 487 or e.g. 404 from upstream server
            xlog("L_INFO", "ACK with t_check_trans: $ci\n");
            route(RELAY);
            exit;
        } else {
            # ACK without matching transaction ... ignore and discard
            xlog("L_INFO", "ACK without matching transaction, discarding: $ci\n");
            xlog("L_INFO", "ACK headers - From: $hdr(From)\n");
            xlog("L_INFO", "ACK headers - To: $hdr(To)\n");
            xlog("L_INFO", "ACK headers - Call-ID: $hdr(Call-ID)\n");
            xlog("L_INFO", "ACK headers - CSeq: $hdr(CSeq)\n");
            xlog("L_INFO", "ACK headers - Via: $hdr(Via)\n");
            xlog("L_INFO", "ACK headers - Route: $hdr(Route)\n");
            exit;
        }
    }
    sl_send_reply("404", "Not here");
    exit;
}

request_route {

     xlog("L_INFO","=== REQUEST START ===\n");
     xlog("L_INFO","Method: $rm, Proto: $pr, From IP: $si:$sp\n");
     xlog("L_INFO","First line: $(mb{s.substr,0,50})\n");

    if (($rm == "GET" || $rm == "POST" || $rm == "PUT" || $rm == "DELETE" ||
             $rm == "HEAD" || $rm == "OPTIONS" || $rm == "PATCH") &&
            ($pr == "TCP" || $pr == "TLS" || $pr == "WS" || $pr == "WSS")) {
            xlog("L_INFO","This looks like an HTTP request ($rm), letting xhttp handle it\n");
            return;
    }

    if(is_maxfwd_lt("10")) {
        sl_send_reply("483","Too Many Hops");
         exit;
    }

    if (is_method("CANCEL")) {
            if (t_check_trans()) {
                route(RELAY);
            }
            exit;
    }

    if (!is_method("ACK")) {
            if(t_precheck_trans()) {
                t_check_trans();
                exit;
            }
            t_check_trans();
    }

     route(WITHINDLG);

    if(is_method("INVITE")) {

         xlog("L_INFO", "=== INBOUND CALL FROM CARRIER ===\n");
         xlog("L_INFO", "From: $fU, To: $tU, Call-ID: $ci\n");
         xlog("L_INFO", "Source IP: $si:$sp\n");
         xlog("L_INFO", "SDP from carrier:\n$rb\n");

         sl_send_reply("100", "Trying");

         if (has_body("application/sdp")) {
            rtpengine_offer("replace-origin replace-session-connection trust-address ICE=remove RTP/AVP");
            if (msg_apply_changes()) {
                xlog("L_INFO", "SDP after rtpengine_offer (for Janus):\n$rb\n");
            }
         }

         t_on_reply("MANAGE_INBOUND_REPLY");
         t_on_failure("INBOUND_FAILED");

         record_route();
         dlg_setflag(4);

     }

     $du="sip:103.216.119.180:9982;transport=udp";
     xlog("L_INFO", "relay to Rust Server via $du\n");
     t_relay();

     exit;
}

onreply_route[MANAGE_INBOUND_REPLY] {
    xlog("L_INFO", "onreply_route[MANAGE_INBOUND_REPLY]: status=$rs, call_id=$ci\n");
    xlog("L_INFO", "Response Via header: $hdr(Via)\n");
    return;
}

failure_route[INBOUND_FAILED] {
    xlog("L_INFO", "failure_route[INBOUND_FAILED] status=$rs\n");
    if (t_is_canceled()) {
        exit;
    }
    xlog("L_INFO", "Cleanup request sent to Rust backend\n");
    rtpengine_delete();
}

branch_route[MANAGE_BRANCH] {
    xlog("L_INFO", "new branch [$T_branch_idx] to $ru\n");
    return;
}

onreply_route[MANAGE_REPLY] {
    xlog("L_INFO", "reply for branch [$T_branch_idx] with status $rs\n");
    xlog("L_INFO", "Response will be sent to Via: $hdr(Via)\n");
    if ($rm != "INVITE") return;
}

# fail route
failure_route[INVITE_FAILED] {
    xlog("L_INFO","failure_route[INVITE_FAILED] status=$rs\n");

    if (t_is_canceled()) {
        exit;
    }
}