refresh_rate: 30 seconds

appenders:
  console:
    kind: console
    encoder:
      pattern: "[{d(%d/%m/%Y %H:%M:%S%.3f)}] [{T}] [{f}:{L}] [{l}] - {m}{n}"

  rolling_file:
    kind: rolling_file
    path: "./log/app.log"
    append: true
    encoder:
      pattern: "[{d(%d/%m/%Y %H:%M:%S%.3f)}] [{T}] [{f}:{L}] [{l}] - {m}{n}"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 100 mb
      roller:
        kind: fixed_window
        pattern: "./log/app-{}.log.gz"
        count: 50

root:
  level: debug
  appenders:
    - console
    - rolling_file
